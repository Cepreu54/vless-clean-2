name: Clean VLess Servers

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download and filter VLESS servers (only remove Russian servers)
        run: |
          curl -s "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass/bypass-all.txt" | \
          grep '^vless://' | \
          grep -v '%F0%9F%87%B7%F0%9F%87%BA' > clean.txt

      - name: Count servers
        run: |
          count=$(wc -l < clean.txt)
          echo "✅ Оставлено VLESS серверов (все, кроме российских): $count"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add clean.txt
          git diff --staged --quiet || git commit -m "Auto-update VLESS clean servers $(date +'%Y-%m-%d %H:%M:%S')"
          git push
